name: twin-github image
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'packages/twin-github/**'
      - 'packages/shared-types/**'
      - 'packages/*/package.json'
      - 'package.json'
      - 'bun.lock'
      - '.dockerignore'
      - '.github/workflows/twin-github-image.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          # One shared package, one image per twin distinguished by tag
          # prefix: ghcr.io/pome-sh/twins:github (rolling), :github-<version>,
          # :github-<sha>. `latest=false` — a single `latest` can't span three
          # twins in one package.
          images: ghcr.io/pome-sh/twins
          flavor: |
            latest=false
          tags: |
            type=raw,value=github,enable={{is_default_branch}}
            type=semver,pattern=github-{{version}}
            type=semver,pattern=github-v{{version}}
            type=sha,prefix=github-,format=short
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: build
        with:
          context: .
          file: packages/twin-github/Dockerfile
          # PR builds verify the Dockerfile compiles but never push to
          # GHCR — only main / tag pushes publish. Without this gate
          # the GITHUB_TOKEN from a fork or unauthorized actor could
          # poison the image. `github.event_name` is the PR vs push
          # signal that survives merge-queue retargeting.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
