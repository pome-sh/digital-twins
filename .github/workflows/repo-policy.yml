name: repo-policy

# F-696 — assert protected main policy (PR + review + required checks).
on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/ci/assert-repo-policy.sh"
      - ".github/workflows/repo-policy.yml"
      - ".github/workflows/dependency-review.yml"
      - ".github/workflows/ci.yml"
      - ".github/workflows/secret-scan.yml"

permissions:
  contents: read
  administration: read

jobs:
  assert:
    name: assert main protection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/ci/assert-repo-policy.sh
